version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      nuget-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/CorpusSearch/ClientApp"
    schedule:
      interval: "monthly"
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
